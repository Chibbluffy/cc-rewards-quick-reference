name: Build check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Validate build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check output size
        run: |
          echo "--- dist size ---"
          du -sh dist/
          echo "--- JS bundle ---"
          ls -lh dist/assets/*.js
